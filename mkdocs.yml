site_name: voids
site_description: Scientific Python package for pore network modeling (PNM)
site_url: https://geomech-project.github.io/voids/
repo_url: https://github.com/geomech-project/voids
repo_name: geomech-project/voids
edit_uri: edit/main/docs/
strict: true

theme:
  name: material
  logo: assets/logo-mark.svg
  favicon: assets/logo.png
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: teal
      accent: cyan
      toggle:
        icon: material/weather-night
        name: Switch to dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: teal
      accent: cyan
      toggle:
        icon: material/weather-sunny
        name: Switch to light mode
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.expand
    - navigation.top
    - search.suggest
    - search.highlight
    - content.code.copy
    - content.code.annotate

plugins:
  - search
  - mkdocstrings:
      handlers:
        python:
          options:
            docstring_style: numpy
            show_source: true
            show_root_heading: true
            show_symbol_type_heading: true
            show_symbol_type_toc: true
            members_order: source
            separate_signature: true
            filters:
              - "!^_"

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.tabbed:
      alternate_style: true
  - attr_list
  - md_in_html
  - toc:
      permalink: true
  - pymdownx.arithmatex:
      generic: true

extra_javascript:
  - javascripts/mathjax.js
  - https://unpkg.com/mathjax@3/es5/tex-mml-chtml.js

extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/geomech-project/voids

nav:
  - Home: index.md
  - Getting Started: getting_started.md
  - Concepts and Conventions: concepts.md
  - Scientific Workflow: workflow.md
  - Examples: examples.md
  - Verification:
    - Overview: verification/index.md
    - XLB Direct-Image Permeability Benchmark: verification/xlb.md
  - Theoretical Background: background.md
  - API Reference:
    - Overview: api/index.md
    - Core Data Structures:
      - api/core.md
    - Physics:
      - api/physics.md
    - Geometry Helpers:
      - api/geom.md
    - Graph Algorithms:
      - api/graph.md
    - Linear Algebra:
      - api/linalg.md
    - I/O:
      - api/io.md
    - Examples:
      - api/examples.md
    - Generators:
      - api/generators.md
    - Image Processing:
      - api/image.md
    - Visualization:
      - api/visualization.md
    - Simulators:
      - api/simulators.md
    - Benchmarks:
      - api/benchmarks.md
